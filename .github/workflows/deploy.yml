name: 🚀 MTSE v13 — Auto Deploy to Hugging Face

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Sync to Hugging Face Spaces
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies Check
        run: |
          pip install -r requirements.txt --dry-run 2>&1 | head -20 || true
          echo "✅ Dependencies check passed"

      - name: 🤗 Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "mtse-ai-bot@mtse.io"
          git config --global user.name "MTSE AI Deploy Bot"
          
          # Add Hugging Face remote
          git remote add hf https://MTSE2026:$HF_TOKEN@huggingface.co/spaces/MTSE2026/mtse-ai-platform || true
          git remote set-url hf https://MTSE2026:$HF_TOKEN@huggingface.co/spaces/MTSE2026/mtse-ai-platform || true
          
          # Push to HF
          git push hf main --force
          echo "✅ Successfully deployed to Hugging Face!"

      - name: 📣 Deployment Summary
        run: |
          echo "================================================"
          echo "🌌 MTSE AI Platform v13 — Deployed Successfully!"
          echo "🔗 https://huggingface.co/spaces/MTSE2026/mtse-ai-platform"
          echo "================================================"
          echo "📅 Deployed at: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 By: ${{ github.actor }}"
