services:
  # The Web / AI Platform Web Service
  - type: web
    name: mtse-ai-platform
    env: docker
    plan: starter # Change to free if needed, but 'starter' usually required for Docker
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8501
      - key: DATABASE_URL
        fromDatabase:
          name: mtse-postgres
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # The FastAPI Webhook Web Service
  - type: web
    name: mtse-webhook-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /webhook
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mtse-postgres
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: mtse-postgres
    databaseName: mtse_saas
    user: admin
    plan: free # Free PostgreSQL database provided by Render
